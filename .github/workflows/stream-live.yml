name: Stream Stardrift Live

on:
  schedule:
    # Keep a restart queued. Concurrency prevents multiple RTMP streams at once.
    - cron: '0 * * * *'
  workflow_dispatch:  # Manual trigger for testing

concurrency:
  group: stardrift-livestream
  cancel-in-progress: false

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - name: Install ffmpeg + python deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install -q google-auth google-auth-oauthlib google-api-python-client

      - name: Download livestream video + metadata from GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/audio-tracks"
          RELEASE_JSON=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" "$RELEASE_URL")

          ASSET_URL=$(echo "$RELEASE_JSON" | \
            python3 -c "import sys,json; assets=json.load(sys.stdin).get('assets',[]); \
              match=[a['browser_download_url'] for a in assets if a['name']=='livestream.mp4']; \
              print(match[0] if match else '')")
          if [ -z "$ASSET_URL" ]; then
            echo "ERROR: livestream.mp4 not found in release. Run build-livestream first."
            exit 1
          fi
          echo "Downloading video from: $ASSET_URL"
          curl -L -o /tmp/livestream.mp4 "$ASSET_URL"
          ls -lh /tmp/livestream.mp4

          # Download metadata (non-fatal — stream can run without it)
          META_URL=$(echo "$RELEASE_JSON" | \
            python3 -c "import sys,json; assets=json.load(sys.stdin).get('assets',[]); \
              match=[a['browser_download_url'] for a in assets if a['name']=='livestream_meta.json']; \
              print(match[0] if match else '')")
          if [ -n "$META_URL" ]; then
            curl -sL -o /tmp/livestream_meta.json "$META_URL"
            echo "Downloaded metadata:"
            cat /tmp/livestream_meta.json | python3 -c "import sys,json; d=json.load(sys.stdin); print('TITLE:', d.get('title','')); print('DESC:', d.get('description','')[:120])"
          else
            echo "No livestream_meta.json found — stream will use existing YouTube title"
          fi

      - name: Prepare YouTube live broadcast metadata + auto-start
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, sys

          meta_path = "/tmp/livestream_meta.json"
          if not os.path.exists(meta_path):
              print("No metadata file — skipping title update")
              sys.exit(0)

          with open(meta_path) as f:
              meta = json.load(f)

          title = meta.get("title", "").strip()
          description = meta.get("description", "").strip()
          if not title:
              title = "Star Drift — 24/7 LIVE Music"

          client_id     = os.getenv("YOUTUBE_CLIENT_ID")
          client_secret = os.getenv("YOUTUBE_CLIENT_SECRET")
          refresh_token = os.getenv("YOUTUBE_REFRESH_TOKEN")
          if not all([client_id, client_secret, refresh_token]):
              print("Missing YouTube OAuth credentials — skipping title update")
              sys.exit(0)

          try:
              from google.oauth2.credentials import Credentials
              from google.auth.transport.requests import Request
              from googleapiclient.discovery import build

              creds = Credentials(
                  token=None,
                  refresh_token=refresh_token,
                  token_uri="https://oauth2.googleapis.com/token",
                  client_id=client_id,
                  client_secret=client_secret,
              )
              creds.refresh(Request())
              yt = build("youtube", "v3", credentials=creds)

              # Find the active/upcoming live broadcast
              resp = yt.liveBroadcasts().list(
                  part="id,snippet,status,contentDetails",
                  broadcastStatus="active",
                  maxResults=5,
              ).execute()
              broadcasts = resp.get("items", [])

              # Also check upcoming if none active
              if not broadcasts:
                  resp2 = yt.liveBroadcasts().list(
                      part="id,snippet,status,contentDetails",
                      broadcastStatus="upcoming",
                      maxResults=5,
                  ).execute()
                  broadcasts = resp2.get("items", [])

              if not broadcasts:
                  print("No active/upcoming broadcasts found — skipping title update")
                  sys.exit(0)

              # Update the first (most recent) broadcast
              broadcast = broadcasts[0]
              bid = broadcast["id"]
              snippet = broadcast["snippet"]
              snippet["title"] = title[:100]
              snippet["description"] = description[:5000]
              content_details = broadcast.get("contentDetails", {})
              content_details["enableAutoStart"] = True
              content_details["enableAutoStop"] = False

              try:
                  yt.liveBroadcasts().update(
                      part="snippet,contentDetails",
                      body={"id": bid, "snippet": snippet, "contentDetails": content_details},
                  ).execute()
                  print(f"✅ Updated broadcast '{bid}' title + auto-start: {title[:80]}")
              except Exception as update_err:
                  print(f"⚠️ Auto-start/contentDetails update failed, falling back to title only: {update_err}")
                  yt.liveBroadcasts().update(
                      part="snippet",
                      body={"id": bid, "snippet": snippet},
                  ).execute()
                  print(f"✅ Updated broadcast '{bid}' title: {title[:80]}")

          except Exception as e:
              print(f"⚠️ Title update failed (non-fatal): {e}")
              # Don't exit 1 — stream should still run even if title update fails
          PYEOF

      - name: Stream to YouTube
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "${YOUTUBE_STREAM_KEY:-}" ]; then
            echo "ERROR: YOUTUBE_STREAM_KEY secret is missing"
            exit 1
          fi

          # Stream for 5h 40min (20400s), leaving cleanup buffer before the 6h job timeout.
          # If YouTube drops RTMP with Broken pipe, reconnect inside this same workflow run.
          DEST="rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY"
          END_AT=$((SECONDS + 20400))
          ATTEMPT=1

          while [ "$SECONDS" -lt "$END_AT" ]; do
            REMAINING=$((END_AT - SECONDS))
            echo "Starting RTMP stream attempt $ATTEMPT for up to ${REMAINING}s"

            set +e
            ffmpeg -hide_banner -loglevel warning -stats -re \
              -stream_loop -1 \
              -i /tmp/livestream.mp4 \
              -t "$REMAINING" \
              -c:v copy \
              -c:a copy \
              -flvflags no_duration_filesize \
              -f flv \
              "$DEST"
            EXIT_CODE=$?
            set -e

            if [ "$EXIT_CODE" -eq 0 ]; then
              echo "ffmpeg exited cleanly"
              break
            fi

            if [ "$SECONDS" -ge "$END_AT" ]; then
              echo "ffmpeg failed at the end of the stream window with exit code $EXIT_CODE"
              exit "$EXIT_CODE"
            fi

            echo "ffmpeg disconnected with exit code $EXIT_CODE; reconnecting in 30s"
            sleep 30
            ATTEMPT=$((ATTEMPT + 1))
          done
