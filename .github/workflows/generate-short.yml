name: Generate Music Short

on:
  schedule:
    # Daily at midnight UTC (6pm EST)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write  # Needed to push archive.txt updates

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libsndfile1 fonts-urw-base35 ttf-mscorefonts-installer
          sudo fc-cache -f

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run generator
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_ENABLED: 'true'
          SKIP_YOUTUBE_UPLOAD: 'false'
          YOUTUBE_PRIVACY: 'public'
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          LLM_PROVIDER: 'groq'
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SOURCE_CHANNEL_URL: ${{ secrets.SOURCE_CHANNEL_URL }}
          ARTIST_NAME: ${{ secrets.ARTIST_NAME }}
          BEATSTARS_URL: ${{ secrets.BEATSTARS_URL }}
          INSTAGRAM_HANDLE: ${{ secrets.INSTAGRAM_HANDLE }}
          HYPERFOLLOW_URL: ${{ secrets.HYPERFOLLOW_URL }}
          SPOTIFY_URL: ${{ secrets.SPOTIFY_URL }}
          APPLE_MUSIC_URL: ${{ secrets.APPLE_MUSIC_URL }}
          FREECASH_URL: ${{ secrets.FREECASH_URL }}
          NUM_SHORTS: '4'
          SCHEDULE_UPLOADS: 'true'
        run: python generate_short.py

      - name: Commit archive.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive.txt
          git diff --cached --quiet || git commit -m "chore: update archive.txt with processed track"
          git pull --rebase && git push
